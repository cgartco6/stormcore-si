name: Stormcore-SI Autonomous Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy-to-production:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Clone the latest codebase into the runner
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Step 2: Set up a secure Python environment for syntax structural integrity testing
      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Run quick install matrix checks to see if package strings compile
      - name: Validate Dependencies Installation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Push the workspace directly to the global Vercel cloud edge network
      - name: Deploy Production Core to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
