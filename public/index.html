<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stormcore-SI // Mobile Station</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased select-none pb-24">

    <!-- Header Panel -->
    <header class="sticky top-0 z-40 border-b border-slate-900 bg-slate-950/80 backdrop-blur-md pt-6 pb-4 px-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="h-2 w-2 rounded-full bg-emerald-500 shadow-lg shadow-emerald-500/50"></div>
            <span class="font-mono text-sm font-bold tracking-widest text-slate-300">STORMCORE-SI</span>
        </div>
        <span class="text-[10px] bg-slate-900 border border-slate-800 text-indigo-400 font-mono px-2 py-0.5 rounded-full">CORE_ACTIVE</span>
    </header>

    <main class="p-4 space-y-4 max-w-xl mx-auto">
        <!-- Live Horizontally Scorable Telemetry Grid -->
        <div class="flex gap-3 overflow-x-auto pb-2 snap-x scrollbar-none">
            <div class="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800/80 p-4 rounded-2xl min-w-[140px] flex-1 snap-start">
                <div class="text-[10px] text-slate-500 font-mono tracking-wider">DAILY TARGET</div>
                <div id="growthDisplay" class="text-xl font-bold font-mono mt-1 text-slate-200">0 / 250</div>
            </div>
            <div class="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800/80 p-4 rounded-2xl min-w-[140px] flex-1 snap-start">
                <div class="text-[10px] text-slate-400 font-mono tracking-wider">REVENUE</div>
                <div id="revenueDisplay" class="text-xl font-bold font-mono mt-1 text-emerald-400">R0.00</div>
            </div>
            <div class="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800/80 p-4 rounded-2xl min-w-[140px] flex-1 snap-start">
                <div class="text-[10px] text-slate-500 font-mono tracking-wider">COMPLIANT</div>
                <div id="complianceDisplay" class="text-xl font-bold font-mono mt-1 text-indigo-400">0 OK</div>
            </div>
        </div>

        <!-- Input Control Panel -->
        <div class="bg-slate-900/40 border border-slate-900 p-5 rounded-3xl backdrop-blur-sm">
            <div class="mb-4">
                <h2 class="text-base font-bold tracking-tight text-slate-200">Deploy New Campaign Module</h2>
                <p class="text-xs text-slate-500">Inject parameters into your active platform repo blocks dynamically.</p>
            </div>
            
            <form id="launchForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-mono tracking-wider text-slate-400 mb-1">CAMPAIGN TITLE / PRODUCT</label>
                    <input type="text" id="name" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-slate-200 transition">
                </div>
                <div>
                    <label class="block text-[10px] font-mono tracking-wider text-slate-400 mb-1">UNIT COST VALUE (ZAR)</label>
                    <input type="number" id="price" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-slate-200 transition">
                </div>
                <div>
                    <label class="block text-[10px] font-mono tracking-wider text-slate-400 mb-1">MARKETING OBJECTIVE DESCRIPTION</label>
                    <textarea id="description" rows="3" required class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-slate-200 transition" placeholder="Provide objective, factual context details..."></textarea>
                </div>

                <button type="submit" class="w-full bg-indigo-600 active:bg-indigo-700 active:scale-[0.98] text-white font-medium py-3.5 rounded-xl text-sm transition font-mono tracking-wide shadow-lg shadow-indigo-600/10">
                    DISPATCH AGENT PIPELINE
                </button>
            </form>
            <div id="responseBox" class="mt-3 p-3 rounded-xl font-mono text-[11px] hidden"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 border-t border-slate-900 bg-slate-950/90 backdrop-blur-lg px-6 py-2 pb-6 flex justify-around items-center max-w-xl mx-auto">
        <button onclick="window.location.reload()" class="flex flex-col items-center gap-1 text-indigo-400">
            <span class="text-xs font-mono font-bold tracking-wider">HUD</span>
        </button>
        <button onclick="alert('Plug-in Status: Active across attached repositories.')" class="flex flex-col items-center gap-1 text-slate-500 hover:text-slate-300">
            <span class="text-xs font-mono font-bold tracking-wider">REPOS</span>
        </button>
    </nav>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log("PWA service worker skipped"));
        }

        // Dynamically references the absolute URL path hosting your serverless operations
        const BACKEND_URL = window.location.origin;

        async function loadTelemetry() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/metrics`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById("growthDisplay").innerText = `${data.growth_count} / 250`;
                    document.getElementById("revenueDisplay").innerText = `R${parseFloat(data.revenue_total).toFixed(2)}`;
                    document.getElementById("complianceDisplay").innerText = `${data.compliance_runs} OK`;
                    if (navigator.vibrate) navigator.vibrate(10);
                }
            } catch (err) { console.log("Telemetry database lookup paused."); }
        }

        document.getElementById("launchForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            if (navigator.vibrate) navigator.vibrate([20, 50]);
            
            const box = document.getElementById("responseBox");
            box.className = "mt-3 p-3 rounded-xl font-mono text-[11px] bg-slate-900 text-slate-400 block";
            box.innerText = "Processing pipeline algorithms...";

            const formData = new FormData();
            formData.append("name", document.getElementById("name").value);
            formData.append("price", document.getElementById("price").value);
            formData.append("description", document.getElementById("description").value);

            try {
                const res = await fetch(`${BACKEND_URL}/api/launch`, { method: "POST", body: formData });
                const data = await res.json();
                
                if (res.ok) {
                    box.className = "mt-3 p-3 rounded-xl font-mono text-[11px] bg-emerald-950/60 border border-emerald-900 text-emerald-400 block";
                    box.innerText = data.message;
                    loadTelemetry();
                } else {
                    box.className = "mt-3 p-3 rounded-xl font-mono text-[11px] bg-rose-950/60 border border-rose-900 text-rose-400 block";
                    box.innerText = data.reason;
                }
            } catch (err) {
                box.className = "mt-3 p-3 rounded-xl font-mono text-[11px] bg-rose-950/60 border border-rose-900 text-rose-400 block";
                box.innerText = "Network pipeline timeout.";
            }
        });

        loadTelemetry();
        setInterval(loadTelemetry, 10000);
    </script>
</body>
</html>
